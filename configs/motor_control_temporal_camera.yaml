seed: 7
device: auto

data:
  data_root: data/motor_camera_pose_2026_06_25
  train_manifest: data/motor_camera_pose_2026_06_25/train.jsonl
  val_manifest: data/motor_camera_pose_2026_06_25/val.jsonl
  image_size: [120, 160]
  lidar_size: 360
  pose_dim: 4
  sequence_length: 5
  lidar_max_range: 10.0

model:
  lidar_size: 360
  pose_dim: 4
  image_feature_dim: 256
  hidden_dim: 256
  gru_layers: 2
  dropout: 0.1
  steering_scale: 100.0
  speed_scale: 20.0

labels:
  steering_limit: 100.0
  speed_limit: 20.0

train:
  batch_size: 64
  epochs: 120
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 2
  checkpoint_dir: checkpoints/motor_control_temporal_camera_2026_06_25

control:
  sequence_length: 5
  steering_output_gain: 1.0
  speed_output_gain: 1.0
  motor_max_angle: 100.0
  motor_min_speed: 0.0
  motor_max_speed: 20.0
  motor_topic: /xycar_motor
  motor_msg_type: xycar_msgs/msg/XycarMotor

ros2:
  inference_hz: 20.0
  qos_depth: 10
  topics:
    image: /usb_cam/image_raw/front
    lidar: /scan
    pose: /scan_odom_map
    steering_cmd: /vla_driving/steering
    speed_cmd: /vla_driving/speed
    motor_cmd: /xycar_motor
