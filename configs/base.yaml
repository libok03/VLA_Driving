seed: 7
device: auto

data:
  data_root: data/sample
  train_manifest: data/sample/train.jsonl
  val_manifest: data/sample/val.jsonl
  image_size: [160, 320]
  lidar_size: 360
  route_points: 10
  waypoint_count: 5
  waypoint_dim: 4

model:
  image_channels: 3
  lidar_size: 360
  pose_dim: 4
  route_points: 10
  waypoint_count: 5
  waypoint_dim: 4
  hidden_dim: 128
  dropout: 0.1
  fusion_type: transformer
  transformer_layers: 2
  transformer_heads: 4

train:
  batch_size: 16
  epochs: 20
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 2
  checkpoint_dir: checkpoints

control:
  wheel_base: 0.32
  lookahead_distance: 1.5
  max_steer_rad: 0.6

route:
  total_laps: 3
  finish_gate_a: [0.0, -1.0]
  finish_gate_b: [0.0, 1.0]
  finish_forward_yaw: 0.0
  lap_cooldown_s: 3.0
  lap_arm_distance_m: 1.0
  shortcut_allowed_laps: [1, 2]

ros2:
  inference_hz: 10.0
  qos_depth: 10
  topics:
    image: /camera/image_raw
    lidar: /scan
    odom: /odom
    local_route: /local_route
    steering_cmd: /vla_driving/steering
    speed_cmd: /vla_driving/speed
    waypoints: /vla_driving/waypoints
