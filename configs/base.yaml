seed: 7
device: auto

data:
  data_root: data/sample
  train_manifest: data/sample/train.jsonl
  val_manifest: data/sample/val.jsonl
  image_size: [160, 320]
  lidar_size: 360
  route_points: 10
  waypoint_count: 5

model:
  image_channels: 3
  lidar_size: 360
  pose_dim: 4
  route_points: 10
  waypoint_count: 5
  hidden_dim: 128
  dropout: 0.1
  fusion_type: transformer
  transformer_layers: 2
  transformer_heads: 4

train:
  batch_size: 16
  epochs: 20
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 2
  checkpoint_dir: checkpoints

control:
  wheel_base: 0.32
  lookahead_distance: 1.5
  max_steer_rad: 0.6
